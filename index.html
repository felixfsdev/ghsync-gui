<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ghsync-gui</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Configuration</h1>
    <form
      id="configForm"
      style="display: flex; flex-direction: column; gap: 10px"
    >
      <label for="storagePath">Folder to backup your repositories to</label>
      <input
        id="storagePath"
        name="storagePath"
        placeholder="e.g., C:\Users\username\backups"
      />
      <label for="pat">Your GitHub PAT</label>
      <input
        id="pat"
        name="pat"
        type="password"
        placeholder="e.g., github_pat_..."
      />
      <label for="ignoredRepos"
        >Ignored repositories (full name, separated by spaces)</label
      >
      <input
        id="ignoredRepos"
        name="ignoredRepos"
        placeholder="e.g., torvalds/linux "
      />
      <div>
        <input type="checkbox" id="lfs" name="lfs" />
        <label for="lfs">Enable Git LFS (leave it off if you are unsure)</label>
      </div>
      <button type="submit" id="saveConfigBtn">Save Configuration</button>
    </form>
    <hr />
    <p>
      Before syncing, ensure that Git (and Git LFS if it is turned on) is
      installed in your system and is connected to the internet. We only support
      syncing public repos at the moment.
    </p>
    <button id="syncBtn" style="width: 100%; margin-bottom: 1rem">
      Sync Now!
    </button>
    <p id="output"></p>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
