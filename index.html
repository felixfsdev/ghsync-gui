<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello World!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Configuration</h1>
    <form
      id="configForm"
      style="display: flex; flex-direction: column; gap: 10px"
    >
      <label for="usersAndOrgs"
        >Users and organizations (separated by spaces)</label
      >
      <input name="usersAndOrgs" placeholder="e.g., octocat github" />
      <label for="pat">Personal Access Toke (PAT)</label>
      <input name="pat" />
      <label for="ignoredRepos"
        >Ignored repositories (separated by spaces)</label
      >
      <input name="ignoredRepos" placeholder="e.g., repo1 repo2" />
      <button type="submit">Save Configuration</button>
    </form>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
