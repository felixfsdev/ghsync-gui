<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Hello World!</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Configuration</h1>
    <form
      id="configForm"
      style="display: flex; flex-direction: column; gap: 10px"
    >
      <label for="usersAndOrgs"
        >Users and organizations (separated by spaces)</label
      >
      <input
        id="usersAndOrgs"
        name="usersAndOrgs"
        placeholder="e.g., octocat github"
      />
      <label for="storagePath">Folder to backup your repositories to</label>
      <input
        id="storagePath"
        name="storagePath"
        placeholder="e.g., C:\Users\username\backups"
      />
      <label for="pat"
        >Personal Access Token (if not provided, only public repositories will
        be synced)</label
      >
      <input
        id="pat"
        name="pat"
        placeholder="e.g., github_pat_... or ghp_..."
      />
      <label for="ignoredRepos"
        >Ignored repositories (separated by spaces)</label
      >
      <input
        id="ignoredRepos"
        name="ignoredRepos"
        placeholder="e.g., repo1 repo2"
      />
      <button type="submit">Save Configuration</button>
    </form>
    <hr />
    <button id="syncBtn" style="width: 100%">Sync Now!</button>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
