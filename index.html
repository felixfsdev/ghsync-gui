<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>ghsync-gui</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>Configuration</h1>
    <form
      id="configForm"
      style="display: flex; flex-direction: column; gap: 10px"
    >
      <label for="usersAndOrgs"
        >Users and organizations (separated by spaces)</label
      >
      <input
        id="usersAndOrgs"
        name="usersAndOrgs"
        placeholder="e.g., octocat github"
      />
      <label for="storagePath">Folder to backup your repositories to</label>
      <input
        id="storagePath"
        name="storagePath"
        placeholder="e.g., C:\Users\username\backups"
      />
      <label for="pat"
        >Personal Access Token (if not provided, only public repositories will
        be synced)</label
      >
      <input
        id="pat"
        name="pat"
        placeholder="e.g., github_pat_... or ghp_..."
      />
      <label for="ignoredRepos"
        >Ignored repositories (separated by spaces)</label
      >
      <input
        id="ignoredRepos"
        name="ignoredRepos"
        placeholder="e.g., repo1 repo2"
      />
      <div>
        <input type="checkbox" id="lfs" name="lfs" />
        <label for="lfs">Enable Git LFS (leave it off if you are unsure)</label>
      </div>
      <button type="submit">Save Configuration</button>
    </form>
    <hr />
    <p>
      Before syncing, ensure that Git (and Git LFS if it is turned on) is
      installed in your system and is connected to the internet.
    </p>
    <button id="syncBtn" style="width: 100%; margin-bottom: 1rem">
      Sync Now!
    </button>
    <p id="progress" class="truncate"></p>
    <p id="output"></p>
    <script type="module" src="/src/renderer.ts"></script>
  </body>
</html>
